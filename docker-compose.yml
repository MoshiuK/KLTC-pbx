version: '3.8'

# Simplified for Neon (no local PostgreSQL needed)
# Database is hosted on Neon serverless PostgreSQL

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  # Optional: Redis for caching (not required for basic operation)
  # Uncomment if you want session caching or rate limiting with Redis
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
